version: '3.8'

services:
  # 1. O Serviço de Inteligência Artificial (Python)
  api:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mapeia o banco de dados vetorial para dentro do container
      - ./chroma_db:/app/chroma_db
      - ./api.py:/app/api.py
    environment:
      - OLLAMA_URL=http://ollama.local:11434
    extra_hosts:
      - "ollama.local:host-gateway"

  # 2. O Serviço de Interface Visual (Next.js)
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Mapeia o projeto INTEIRO de uma vez (acaba com o problema de arquivos faltando)
      - ./:/app
      # Protege as pastas internas do container contra o seu sistema local
      - /app/node_modules
      - /app/.next